name: "CodeQL Custom Analysis"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]
        # Definiamo manual qui per far funzionare l'if dello script
        build-mode: [ 'manual' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Inizializzazione con il tuo pacchetto custom
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Puntamento al tuo pacchetto custom (assicurati che il nome nel qlpack.yml sia questo)
        queries: ./.github/codeql/custom-queries

    # 2. Build Manuale (Estratto dalla tua immagine)
    - name: Install dependencies and Build
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        set -xe

        echo "::group::Install dependencies"
        sudo apt-get update
        sudo apt-get install -y libsdl1.2-dev bison flex
        echo "::endgroup::"

        echo "::group::Build project"
        make clean || echo "make clean failed"
        make defconfig || echo "make defconfig failed"
        make all || echo "make all failed"
        echo "::endgroup::"

    # 3. Esecuzione Analisi
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
